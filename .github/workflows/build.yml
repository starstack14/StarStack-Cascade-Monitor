name: Build Windows EXE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Compile source
        run: python -m py_compile main.py webpanel.py openwrt.py history.py remnawave.py routecheck.py leaktest.py nettest.py security.py
      - name: Build executable
        shell: powershell
        run: .\build_exe.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: StarStack-Cascade-Monitor-Windows
          path: dist/StarStack-Cascade-Monitor.exe
          if-no-files-found: error
          retention-days: 14
