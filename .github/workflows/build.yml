name: Build Windows EXE

on:
  push:
    branches: [main, rewrite/dotnet]
    tags: ["v*"]
  pull_request:
    branches: [main, rewrite/dotnet]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Build self-contained WPF EXE
        run: dotnet publish src/StarStack.CascadeMonitor/StarStack.CascadeMonitor.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true --output publish
      - uses: actions/upload-artifact@v4
        with:
          name: StarStack-Cascade-Monitor-Windows
          path: publish/StarStack-Cascade-Monitor.exe
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: StarStack-Cascade-Monitor-Windows
          path: release
      - name: Create release and attach EXE
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" "release/StarStack-Cascade-Monitor.exe" --repo "${{ github.repository }}" --title "StarStack Cascade Monitor ${{ github.ref_name }}" --generate-notes
